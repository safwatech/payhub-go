name: publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.sha }}
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go vet ./...
      - name: Stage shared test vectors at the path tests expect
        run: |
          # Tests reference filepath.Join("..", "shared", "test-vectors", ...).
          # On the mirror, vectors live in vendor/shared/test-vectors/ — stage
          # a sibling 'shared/' so both monorepo and mirror runs resolve.
          mkdir -p ../shared
          cp -R vendor/shared/test-vectors ../shared/
      - run: go test ./...
      - name: Warm pkg.go.dev cache
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ -n "${TAG}" ]; then
            curl -fsS "https://proxy.golang.org/github.com/safwatech/payhub-go/@v/${TAG}.info"
          fi
